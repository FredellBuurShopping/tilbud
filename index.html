<style>
  :root{--bg:#EBEFE8;--ink:#232A20;--muted:#79826F;--line:#DDE3D6;--accent:#436E4A;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);
       -webkit-font-smoothing:antialiased;}
  .wrap{max-width:640px;margin:0 auto;padding:30px 18px 90px;}
  h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:32px;letter-spacing:-.02em;}
  .sub{color:var(--muted);font-size:13px;margin:6px 0 20px;}
  h2{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);
     font-weight:700;margin:24px 0 4px;}
  .item{display:flex;align-items:center;gap:14px;padding:14px 2px;border-top:1px solid var(--line);cursor:pointer;}
  .item input{width:26px;height:26px;flex:0 0 auto;accent-color:var(--accent);pointer-events:none;order:9;}
  .item img,.noimg{width:72px;height:72px;object-fit:contain;border-radius:10px;
                   border:1px solid var(--line);background:#fff;flex:0 0 auto;cursor:zoom-in;}
  .txt{min-width:0;flex:1;}
  .n{display:block;font-weight:600;font-size:16px;}
  .d{display:block;color:var(--muted);font-size:12.5px;}
  .p{font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap;}
  .item.done .n,.item.done .d,.item.done .p{opacity:.4;text-decoration:line-through;}
  .empty{color:var(--muted);font-size:15px;margin-top:22px;line-height:1.5;}
  #lb{position:fixed;inset:0;background:rgba(20,22,18,.92);display:none;align-items:center;
      justify-content:center;padding:20px;z-index:100;cursor:zoom-out;}
  #lb.open{display:flex;}
  #lb img{max-width:100%;max-height:100%;border-radius:12px;background:#fff;}
</style></head>

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function kr(n){return n.toFixed(2).replace('.',',');}
var KEY='tilbud_tjek';
function ticks(){try{return JSON.parse(localStorage.getItem(KEY))||{};}catch(e){return{};}}
function saveTicks(t){try{localStorage.setItem(KEY,JSON.stringify(t));}catch(e){}}
function curIds(){
  var m=(location.hash||'').match(/l=([^&]*)/);
  if(m){ var ids=decodeURIComponent(m[1]).split(',').filter(Boolean);
         try{localStorage.setItem('tilbud_sidste',JSON.stringify(ids));}catch(e){}
         return ids; }
  try{ return JSON.parse(localStorage.getItem('tilbud_sidste'))||[]; }catch(e){ return []; }
}
function updateSub(ids){var t=ticks(),done=0,total=0;ids.forEach(function(id){if(DATA[id]){total+=DATA[id].p;if(t[id])done++;}});
  var s=document.getElementById('sub');if(s)s.textContent=ids.length?(done+' af '+ids.length+' krydset af · '+kr(total)+' kr i alt'):'';}
function render(){
  var ids=curIds(),root=document.getElementById('list');
  if(!ids.length){root.innerHTML='<p class="empty">Åbn QR-koden fra tilbudssiden på din computer, så viser den din liste her.</p>';updateSub(ids);return;}
  var groups={};ids.forEach(function(id){if(!DATA[id])return;var store=id.split('|')[1];(groups[store]=groups[store]||[]).push(id);});
  var t=ticks(),html='';
  Object.keys(groups).sort().forEach(function(store){
    html+='<h2>'+esc(store)+'</h2>';
    groups[store].forEach(function(id){var d=DATA[id];var dc=t[id]?' done':'';var ck=t[id]?' checked':'';
      html+='<div class="item'+dc+'" data-id="'+esc(id)+'">'+
        (d.img?'<img src="'+esc(d.img)+'" referrerpolicy="no-referrer" onerror="this.style.visibility=\'hidden\'">':'<span class="noimg"></span>')+
        '<span class="txt"><span class="n">'+esc(d.n)+'</span><span class="d">'+esc(d.d)+(d.u?' · '+esc(d.u):'')+'</span></span>'+
        '<span class="p">'+kr(d.p)+' kr</span>'+
        '<input type="checkbox"'+ck+'></div>';
    });
  });
  root.innerHTML=html;updateSub(ids);
  [].slice.call(root.querySelectorAll('.item')).forEach(function(row){
    row.addEventListener('click',function(e){
      if(e.target.tagName==='IMG'){ openLB(e.target.src); return; }
      var id=row.dataset.id,t=ticks(),now=!t[id];
      if(now){t[id]=1;}else{delete t[id];}
      saveTicks(t);
      var cb=row.querySelector('input');if(cb)cb.checked=now;
      row.classList.toggle('done',now);updateSub(curIds());
    });
  });
}
var lb=document.getElementById('lb');
lb.addEventListener('click',function(){lb.classList.remove('open');});
function openLB(src){var i=lb.querySelector('img');i.src=src;lb.classList.add('open');}
window.addEventListener('hashchange',render);
render();
if(!/l=/.test(location.hash||'')){
  fetch('liste.json?t='+Date.now()).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;})
  .then(function(ids){ if(ids&&ids.length){ try{localStorage.setItem('tilbud_sidste',JSON.stringify(ids));}catch(e){} render(); } });
}
